<!DOCTYPE html>
<!-- アイコン生成用の一時ファイル。ブラウザで開いてアイコンをダウンロードする -->
<html>
<head><meta charset="UTF-8"><title>アイコン生成</title></head>
<body>
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 背景
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#6c63ff');
  grad.addColorStop(1, '#4f46e5');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // テキスト「英」
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.45}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('英', size / 2, size * 0.42);

  // サブテキスト「準1級」
  ctx.font = `bold ${size * 0.16}px sans-serif`;
  ctx.fillText('準1級', size / 2, size * 0.75);

  return canvas.toDataURL('image/png');
}

[192, 512].forEach(size => {
  const a = document.createElement('a');
  a.href = makeIcon(size);
  a.download = `icon-${size}.png`;
  a.textContent = `icon-${size}.png をダウンロード`;
  a.style = 'display:block;margin:10px;font-size:18px';
  document.body.appendChild(a);
});
</script>
</body>
</html>
